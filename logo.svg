<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 72" width="360" height="72">
  <!-- Background -->
  <rect width="360" height="72" fill="#0d0b09"/>
  <!-- Outer border -->
  <rect x="3" y="3" width="354" height="66" fill="none" stroke="#b8975a" stroke-width="0.8" opacity="0.55"/>

  <!-- Main wordmark — bigger, cream, high contrast -->
  <text x="180" y="33"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="30" font-weight="700"
        fill="#f0ebe0" text-anchor="middle" letter-spacing="1">Welden Works</text>

  <!-- Divider -->
  <line x1="58"  y1="42" x2="158" y2="42" stroke="#b8975a" stroke-width="0.7"/>
  <circle cx="180" cy="42" r="2.2" fill="#b8975a"/>
  <line x1="202" y1="42" x2="302" y2="42" stroke="#b8975a" stroke-width="0.7"/>

  <!-- Tagline — wider tracking, gold, legible size -->
  <text x="180" y="60"
        font-family="Arial, Helvetica, sans-serif"
        font-size="8.5" font-weight="600"
        fill="#b8975a" text-anchor="middle" letter-spacing="3">WEB DESIGN · AI RECEPTIONISTS</text>
</svg>
